name: Invio Email Automatico
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Aggiornato a v4
      - name: Set up Python
        uses: actions/setup-python@v5 # Aggiornato a v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install firebase-admin
      - name: Run Mailer
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: python run_mailer.py
