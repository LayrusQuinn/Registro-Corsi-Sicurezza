name: Notifica Scadenze Corsi

on:
  # Il workflow si attiva solo quando riceve un segnale esterno
  repository_dispatch:
    types: [run-mailer]
  # Opzionale: mantieni questo se vuoi ancora testare a mano
  workflow_dispatch:

jobs:
  run-mailer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Installazione dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin
      - name: Esecuzione script mailer
        run: python run_mailer.py
        env:
          FIREBASE_JSON_CONTENT: ${{ secrets.FIREBASE_JSON }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
