name: Notifica Scadenze Corsi

on:
  # Esecuzione automatica ogni mattina alle 07:45 UTC (09:45 italiane con ora legale)
  # Nota: in inverno (ora solare, UTC+1) questo cron girerà alle 08:45 italiane.
  schedule:
    - cron: '45 7 * * *'
  # Permette di lanciarlo manualmente dalla tab "Actions" su GitHub per fare dei test
  workflow_dispatch:

jobs:
  run-mailer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installazione dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      - name: Esecuzione script mailer
        run: python run_mailer.py
        env:
          # Mappatura dei segreti per Firebase e l'invio SMTP di Gmail
          FIREBASE_JSON_CONTENT: ${{ secrets.FIREBASE_JSON }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
