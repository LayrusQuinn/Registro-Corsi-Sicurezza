name: Invio Email Automatico

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install firebase-admin
        
      - name: Run Test
        env:
          # Usiamo il segreto di prova che deve contenere solo "1234567890"
          TEST_VALORE: ${{ secrets.TEST_SECRET }}
        run: |
          python -c "import os; print(f'DEBUG: Lunghezza TEST_VALORE: {len(str(os.environ.get(\"TEST_VALORE\")))}'); print(f'DEBUG: Valore ricevuto: {os.environ.get(\"TEST_VALORE\")}')"
