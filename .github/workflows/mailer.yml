name: Notifica Scadenze Corsi

on:
  push:
    branches:
      - main
  # Esecuzione automatica alle 10:30 italiane (08:30 UTC)
  schedule:
    - cron: '32 8 * * *'
  # Permette di lanciarlo manualmente dalla tab "Actions" su GitHub
  workflow_dispatch:

jobs:
  run-mailer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Installazione dipendenze
        run: |
          pip install firebase-admin

      - name: Esecuzione script mailer
        run: python run_mailer.py
        env:
          # Mappatura corretta: il segreto FIREBASE_JSON viene assegnato 
          # alla variabile d'ambiente attesa dallo script (FIREBASE_JSON_CONTENT)
          FIREBASE_JSON_CONTENT: ${{ secrets.FIREBASE_JSON }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
